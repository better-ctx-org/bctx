name: Feature request
description: Suggest an idea or improvement for bctx.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the pain point, not the solution.
      placeholder: "When I use bctx with X, I have to do Y manually every time…"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like bctx to behave?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered

  - type: dropdown
    id: scope
    attributes:
      label: Which part of bctx?
      multiple: true
      options:
        - CLI
        - MCP server
        - Skills (tools)
        - Tree-sitter / language support
        - Install / packaging
        - Analytics / dashboard
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: agent
    attributes:
      label: Which agent(s) would this help with?
      placeholder: "Claude Code, Cursor, …"
